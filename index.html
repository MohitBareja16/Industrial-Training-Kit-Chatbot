<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecodesBot - AI Logic Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --user-msg-bg: #334155;
            --bot-msg-bg: transparent;
            --border-color: #334155;
            --input-bg: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-color);
        }

        .new-chat-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 0.9rem;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .new-chat-btn:hover {
            background-color: var(--user-msg-bg);
        }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .message-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .message {
            max-width: 800px;
            width: 100%;
            display: flex;
            gap: 20px;
            padding: 10px;
            animation: fadeIn 0.3s ease-out;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .user-avatar {
            background-color: var(--user-msg-bg);
            color: var(--text-primary);
        }

        .bot-avatar {
            background-color: var(--accent-color);
            color: #fff;
        }

        .message-content {
            flex: 1;
            line-height: 1.6;
            font-size: 1rem;
            padding-top: 6px;
        }

        .bot-message-wrapper {
            background-color: var(--bot-msg-bg);
        }

        /* Input Area */
        .input-container {
            padding: 30px;
            background: linear-gradient(180deg, transparent, var(--bg-color) 40%);
            display: flex;
            justify-content: center;
        }

        .input-box {
            max-width: 800px;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
        }

        .chat-input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 16px 50px 16px 20px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .send-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: color 0.2s, background-color 0.2s;
        }

        .send-btn:hover {
            color: var(--accent-color);
            background-color: rgba(56, 189, 248, 0.1);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
        }

        .footer-text {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 10px;
            position: absolute;
            bottom: 10px;
            width: 100%;
        }

        /* Loading Indicator */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding-top: 14px;
        }
        
        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown styling basics */
        code {
            font-family: monospace;
            background-color: var(--user-msg-bg);
            padding: 2px 4px;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .message { padding: 10px 20px; }
            .input-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a10 10 0 1 0 10 10H12V2z"></path>
                <path d="M12 12V2.12a10 10 0 0 1 9.88 9.88H12z"></path>
            </svg>
            DecodesBot
        </div>
        <button class="new-chat-btn" onclick="clearChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            New chat
        </button>
    </div>

    <div class="main-content">
        <div class="chat-container" id="chatContainer">
            <!-- Initial Greeting -->
            <div class="message-wrapper bot-message-wrapper">
                <div class="message">
                    <div class="avatar bot-avatar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                            <circle cx="12" cy="5" r="2"></circle>
                            <path d="M12 7v4"></path>
                            <line x1="8" y1="16" x2="8" y2="16"></line>
                            <line x1="16" y1="16" x2="16" y2="16"></line>
                        </svg>
                    </div>
                    <div class="message-content">
                        Hello! I am DecodesBot, your Rule-Based Logic Engine. I am completely deterministic. Type <code>help</code> to see what I know!
                    </div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-box">
                <input type="text" id="chatInput" class="chat-input" placeholder="Message DecodesBot..." autocomplete="off">
                <button class="send-btn" id="sendBtn" title="Send message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="footer-text">
                DecodeLabs Industrial Training Kit | Batch 2026 | Project 1
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function clearChat() {
            chatContainer.innerHTML = `
                <div class="message-wrapper bot-message-wrapper">
                    <div class="message">
                        <div class="avatar bot-avatar">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                                <circle cx="12" cy="5" r="2"></circle>
                                <path d="M12 7v4"></path>
                                <line x1="8" y1="16" x2="8" y2="16"></line>
                                <line x1="16" y1="16" x2="16" y2="16"></line>
                            </svg>
                        </div>
                        <div class="message-content">
                            Hello! I am DecodesBot, your Rule-Based Logic Engine. I am completely deterministic. Type <code>help</code> to see what I know!
                        </div>
                    </div>
                </div>
            `;
        }

        function appendUserMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';
            wrapper.innerHTML = `
                <div class="message">
                    <div class="avatar user-avatar">U</div>
                    <div class="message-content">${escapeHTML(text)}</div>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper bot-message-wrapper typing-indicator-wrapper';
            wrapper.id = 'typingIndicator';
            wrapper.innerHTML = `
                <div class="message">
                    <div class="avatar bot-avatar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                            <circle cx="12" cy="5" r="2"></circle>
                            <path d="M12 7v4"></path>
                        </svg>
                    </div>
                    <div class="message-content">
                        <div class="typing-indicator">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            scrollToBottom();
            return wrapper;
        }

        function appendBotMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper bot-message-wrapper';
            
            // Basic markdown-like handling for newlines and code formatting
            let formattedText = escapeHTML(text)
                .replace(/\n/g, '<br>')
                .replace(/\`(.*?)\`/g, '<code>$1</code>');

            wrapper.innerHTML = `
                <div class="message">
                    <div class="avatar bot-avatar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                            <circle cx="12" cy="5" r="2"></circle>
                            <path d="M12 7v4"></path>
                            <line x1="8" y1="16" x2="8" y2="16"></line>
                            <line x1="16" y1="16" x2="16" y2="16"></line>
                        </svg>
                    </div>
                    <div class="message-content">${formattedText}</div>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        async function handleSend() {
            const message = chatInput.value.trim();
            if (!message) return;

            chatInput.value = '';
            appendUserMessage(message);

            const typingEl = showTypingIndicator();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                
                // Remove typing indicator
                typingEl.remove();
                
                if (data.response) {
                    appendBotMessage(data.response);
                } else {
                    appendBotMessage("Error: Could not retrieve response.");
                }
            } catch (error) {
                typingEl.remove();
                appendBotMessage("Connection error. Is the Python server running?");
            }
        }

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        sendBtn.addEventListener('click', handleSend);
    </script>
</body>
</html>
